<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl cap">
  <title id="ttl">Gauss-Newton: linearize the residual at the current guess</title>
  <desc id="cap">A nonlinear residual curve, its tangent of slope J at x_k, and the step to where the linear model is minimized.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#FFD54A"/>
    </marker>
    <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#9aa6bd"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="24" y="34" fill="#58C4DD" font-family="Georgia,serif" font-size="21">Gauss-Newton: linearize, then solve</text>
  <text x="24" y="56" fill="#9aa6bd" font-family="Georgia,serif" font-size="13">tangent slope J at x_k; the linear model predicts the step to where r=0</text>

  <!-- axes -->
  <line x1="80" y1="400" x2="660" y2="400" stroke="#9aa6bd" stroke-width="1.5" marker-end="url(#arrT)"/>
  <line x1="80" y1="400" x2="80" y2="90" stroke="#9aa6bd" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="650" y="424" fill="#9aa6bd" font-family="Georgia,serif" font-size="14" font-style="italic">x</text>
  <text x="52" y="100" fill="#9aa6bd" font-family="Georgia,serif" font-size="14" font-style="italic">r(x)</text>
  <line x1="80" y1="300" x2="660" y2="300" stroke="#26324d" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="58" y="305" fill="#9aa6bd" font-family="Georgia,serif" font-size="12">0</text>

  <!-- nonlinear residual curve r(x) -->
  <path d="M110 150 Q 250 240 330 230 T 560 360" fill="none" stroke="#9CE8D6" stroke-width="2.5"/>
  <text x="150" y="150" fill="#9CE8D6" font-family="Georgia,serif" font-size="14" font-style="italic">r(x) nonlinear</text>

  <!-- current point x_k on the curve: approx (330,230) -->
  <circle cx="330" cy="230" r="5" fill="#FC6255"/>
  <line x1="330" y1="230" x2="330" y2="400" stroke="#FC6255" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="312" y="418" fill="#FC6255" font-family="Georgia,serif" font-size="14" font-style="italic">x_k</text>

  <!-- residual value r(x_k): from baseline up to point -->
  <line x1="330" y1="300" x2="330" y2="230" stroke="#FC6255" stroke-width="2"/>
  <text x="338" y="270" fill="#FC6255" font-family="Georgia,serif" font-size="13" font-style="italic">r(x_k)</text>

  <!-- tangent line (linear model) slope J through (330,230) -->
  <line x1="210" y1="170" x2="510" y2="350" stroke="#FFD54A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="430" y="318" fill="#FFD54A" font-family="Georgia,serif" font-size="14" font-style="italic">r(x_k)+J&#8901;&#916;x</text>
  <text x="222" y="160" fill="#FFD54A" font-family="Georgia,serif" font-size="13">slope = J (given)</text>

  <!-- where tangent meets r=0: x_k + dx, approx x=450 -->
  <circle cx="450" cy="300" r="4.5" fill="#83C167"/>
  <line x1="450" y1="300" x2="450" y2="400" stroke="#83C167" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="418" y="418" fill="#83C167" font-family="Georgia,serif" font-size="14" font-style="italic">x_k+&#916;x</text>

  <!-- step dx along x-axis -->
  <line x1="330" y1="386" x2="450" y2="386" stroke="#FFD54A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="372" y="378" fill="#FFD54A" font-family="Georgia,serif" font-size="14" font-style="italic">&#916;x</text>

  <!-- given scaffold relation -->
  <rect x="430" y="120" width="250" height="56" rx="6" fill="#0e1116" stroke="#26324d" stroke-width="1"/>
  <text x="444" y="143" fill="#58C4DD" font-family="Georgia,serif" font-size="13">given (tangent / linear model):</text>
  <text x="444" y="165" fill="#9CE8D6" font-family="Georgia,serif" font-size="14" font-style="italic">r(x_k+&#916;x) &#8776; r(x_k) + J &#916;x</text>
</svg>
