<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="A point on the unit circle has coordinates cosine theta and sine theta, shown as green and red projections">
  <defs>
    <pattern id="g4" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#222c44" stroke-width="1"/></pattern>
    <marker id="g4y" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFD54A"/></marker>
  </defs>
  <rect width="720" height="440" fill="#0e1116"/>
  <rect width="720" height="440" fill="url(#g4)" opacity="0.4"/>
  <line x1="20" y1="250" x2="700" y2="250" stroke="#54648a" stroke-width="1.5"/>
  <line x1="240" y1="20" x2="240" y2="420" stroke="#54648a" stroke-width="1.5"/>

  <!-- unit circle -->
  <circle cx="240" cy="250" r="150" fill="none" stroke="#3f5a86" stroke-width="2"/>

  <!-- radius to point at theta ~ 40deg : P = (240+150cos, 250-150sin) -->
  <line x1="240" y1="250" x2="355" y2="154" stroke="#FFD54A" stroke-width="4" marker-end="url(#g4y)"/>
  <!-- cos (green) and sin (red) -->
  <line x1="240" y1="250" x2="355" y2="250" stroke="#83C167" stroke-width="4"/>
  <line x1="355" y1="250" x2="355" y2="154" stroke="#FC6255" stroke-width="4"/>
  <circle cx="355" cy="154" r="5" fill="#FFD54A"/>
  <circle cx="240" cy="250" r="4" fill="#cdd6e6"/>

  <!-- angle arc -->
  <path d="M300 250 A60 60 0 0 0 286 214" fill="none" stroke="#9aa6bd" stroke-width="2"/>
  <text x="300" y="238" fill="#9aa6bd" font-family="Georgia, serif" font-style="italic" font-size="18">&#952;</text>

  <text x="280" y="276" fill="#83C167" font-family="Georgia, serif" font-style="italic" font-size="18">cos &#952;</text>
  <text x="362" y="206" fill="#FC6255" font-family="Georgia, serif" font-style="italic" font-size="18">sin &#952;</text>
  <text x="366" y="150" fill="#FFD54A" font-family="Georgia, serif" font-style="italic" font-size="16">(cos &#952;, sin &#952;)</text>

  <text x="36" y="56" fill="#58C4DD" font-family="Georgia, serif" font-size="22">The unit circle defines sine and cosine</text>
  <text x="36" y="82" fill="#6f7d97" font-family="Georgia, serif" font-size="16">a rotation by &#952; sends (1,0) to (cos &#952;, sin &#952;)</text>
</svg>
