<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="yel" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#FFD54A"/>
    </marker>
    <marker id="red" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#FC6255"/>
    </marker>
    <marker id="grn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0L6 3L0 6Z" fill="#83C167"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="28" y="40" fill="#58C4DD" font-size="22" font-style="italic">Inverse kinematics: stepping the arm onto the target</text>
  <text x="28" y="62" fill="#9aa6bd" font-size="13">Given the pose error e and the Jacobian J, construct the joint step &#916;&#952; that closes the gap.</text>

  <!-- base -->
  <circle cx="150" cy="360" r="6" fill="#9aa6bd"/>
  <line x1="120" y1="378" x2="180" y2="378" stroke="#9aa6bd" stroke-width="3"/>
  <text x="118" y="398" fill="#9aa6bd" font-size="12">base &#952;</text>

  <!-- 2R arm: link1 to elbow, link2 to current tip -->
  <line x1="150" y1="360" x2="300" y2="250" stroke="#9CE8D6" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="250" x2="430" y2="300" stroke="#9CE8D6" stroke-width="6" stroke-linecap="round"/>
  <circle cx="300" cy="250" r="6" fill="#0e1116" stroke="#9CE8D6" stroke-width="3"/>
  <text x="262" y="238" fill="#9CE8D6" font-size="13">&#952;&#8322;</text>
  <text x="176" y="318" fill="#9CE8D6" font-size="13">&#952;&#8321;</text>

  <!-- current tip -->
  <circle cx="430" cy="300" r="7" fill="#FFD54A"/>
  <text x="404" y="328" fill="#FFD54A" font-size="13">current tip x(&#952;)</text>

  <!-- target pose -->
  <circle cx="560" cy="170" r="7" fill="#FC6255"/>
  <line x1="560" y1="170" x2="596" y2="148" stroke="#FC6255" stroke-width="2.5"/>
  <line x1="560" y1="170" x2="582" y2="206" stroke="#FC6255" stroke-width="2.5"/>
  <text x="568" y="158" fill="#FC6255" font-size="13">target T_sd</text>

  <!-- error vector e (current -> target) -->
  <line x1="430" y1="300" x2="552" y2="178" stroke="#83C167" stroke-width="3" marker-end="url(#grn)"/>
  <text x="468" y="226" fill="#83C167" font-size="14" font-style="italic">e = log(T_sb&#8315;&#185; T_sd)</text>

  <!-- joint-rate -> twist scaffold (given) -->
  <line x1="430" y1="300" x2="470" y2="356" stroke="#FFD54A" stroke-width="2.5" marker-end="url(#yel)"/>
  <text x="436" y="376" fill="#FFD54A" font-size="12">columns of J = tip motion per joint</text>

  <!-- given scaffold box -->
  <rect x="452" y="372" width="246" height="62" rx="7" fill="#161d2b" stroke="#26324d" stroke-width="1.5"/>
  <text x="464" y="392" fill="#58C4DD" font-size="12" font-style="italic">given (local linear model):</text>
  <text x="464" y="414" fill="#e7ecf5" font-size="15">e &#8776; J(&#952;) &#916;&#952;</text>
  <text x="464" y="430" fill="#9aa6bd" font-size="11">solve for &#916;&#952; &#8212; J singular &#8658; damp</text>

  <!-- singular-direction warning near full extension -->
  <path d="M300 250 Q420 232 540 268" fill="none" stroke="#FC6255" stroke-width="1.3" stroke-dasharray="5 5"/>
  <text x="338" y="232" fill="#FC6255" font-size="11" font-style="italic">near full extension: &#963;&#8347;&#8336; &#8594; 0</text>
</svg>
