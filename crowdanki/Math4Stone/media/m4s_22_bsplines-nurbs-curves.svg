<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl cap">
  <title id="ttl">B-spline curve from a control polygon</title>
  <desc id="cap">Control points P0..P3, basis blend at parameter u, given partition of unity.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#FFD54A"/>
    </marker>
    <marker id="arrb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#58C4DD"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="24" y="36" font-family="Georgia,serif" font-size="21" fill="#58C4DD">B-spline curve: blend control points by basis weights</text>
  <text x="24" y="58" font-family="sans-serif" font-size="13" fill="#9aa6bd">Quadratic p=2, clamped knots U={0,0,0, 1/2, 1,1,1}. Derive C(u) from the polygon.</text>

  <!-- control polygon: P0(0,0) P1(1,2) P2(3,2) P3(4,0) mapped to canvas -->
  <!-- mapping: x_px = 120 + x*120, y_px = 400 - y*110 -->
  <polyline points="120,400 240,180 360,180 480,400" fill="none" stroke="#9aa6bd" stroke-width="1.6" stroke-dasharray="6 5"/>

  <!-- the curve (approx quadratic B-spline through the example) -->
  <path d="M120,400 Q210,202 300,290 Q390,202 480,400" fill="none" stroke="#83C167" stroke-width="3"/>

  <!-- control point vectors from origin-ish anchor for visual cue, kept light -->
  <!-- nonzero-basis vectors at u=1/2 (P1 and P2 each weight 1/2) -->
  <line x1="300" y1="290" x2="240" y2="180" stroke="#FFD54A" stroke-width="2.4" marker-end="url(#arr)"/>
  <line x1="300" y1="290" x2="360" y2="180" stroke="#FFD54A" stroke-width="2.4" marker-end="url(#arr)"/>

  <!-- control points -->
  <g font-family="sans-serif" font-size="14">
    <circle cx="120" cy="400" r="5.5" fill="#FC6255"/><text x="98" y="420" fill="#FC6255">P0</text>
    <circle cx="240" cy="180" r="5.5" fill="#FC6255"/><text x="222" y="170" fill="#FC6255">P1(1,2)</text>
    <circle cx="360" cy="180" r="5.5" fill="#FC6255"/><text x="344" y="170" fill="#FC6255">P2(3,2)</text>
    <circle cx="480" cy="400" r="5.5" fill="#FC6255"/><text x="470" y="420" fill="#FC6255">P3</text>
  </g>

  <!-- curve point at u=1/2 -->
  <circle cx="300" cy="290" r="6" fill="#9CE8D6"/>
  <text x="312" y="295" font-family="sans-serif" font-size="14" fill="#9CE8D6">C(1/2)</text>

  <!-- parameter axis -->
  <line x1="120" y1="436" x2="480" y2="436" stroke="#58C4DD" stroke-width="1.6" marker-end="url(#arrb)"/>
  <text x="118" y="452" font-family="sans-serif" font-size="12" fill="#58C4DD">u=0</text>
  <text x="292" y="452" font-family="sans-serif" font-size="12" fill="#58C4DD">u=1/2</text>
  <text x="466" y="452" font-family="sans-serif" font-size="12" fill="#58C4DD">u=1</text>
  <line x1="300" y1="290" x2="300" y2="436" stroke="#9CE8D6" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- given scaffold relation -->
  <g font-family="Georgia,serif">
    <rect x="500" y="150" width="196" height="78" rx="6" fill="#141b27" stroke="#26324d"/>
    <text x="512" y="174" font-size="13" fill="#9aa6bd">given (partition of unity):</text>
    <text x="512" y="200" font-size="17" fill="#9CE8D6">&#931;&#8341; N&#7522;&#8323;&#8202;,&#8202;&#8322;(u) = 1</text>
    <text x="512" y="221" font-size="12" fill="#9aa6bd">N&#8321;&#8322;=N&#8322;&#8322;=1/2 at u=1/2</text>
  </g>

  <text x="24" y="448" font-family="sans-serif" font-size="11" fill="#9aa6bd" opacity="0">spacer</text>
</svg>
