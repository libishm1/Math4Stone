<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" role="img" aria-label="Two ball-end tool circles of radius R on adjacent passes separated by stepover s, leaving a cusp of height h between them, with the right triangle that relates R, s, and h">
  <defs>
    <pattern id="gp" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1d2740" stroke-width="1"/></pattern>
  </defs>
  <rect width="720" height="470" fill="#0e1116"/>
  <rect width="720" height="470" fill="url(#gp)" opacity="0.4"/>

  <!-- baseline (deepest cut) -->
  <line x1="80" y1="360" x2="650" y2="360" stroke="#54648a" stroke-width="1.5"/>
  <text x="86" y="380" fill="#6f7d97" font-family="Georgia, serif" font-size="13">finished depth</text>

  <!-- two tool circles radius R=110, centers (300,250) (470,250), s=170 -->
  <circle cx="300" cy="250" r="110" fill="#58C4DD" opacity="0.10" stroke="#58C4DD" stroke-width="2"/>
  <circle cx="470" cy="250" r="110" fill="#FFD54A" opacity="0.08" stroke="#FFD54A" stroke-width="2"/>
  <circle cx="300" cy="250" r="3.5" fill="#cdd6e6"/>
  <circle cx="470" cy="250" r="3.5" fill="#cdd6e6"/>

  <!-- stepover s between centers -->
  <line x1="300" y1="250" x2="470" y2="250" stroke="#83C167" stroke-width="2"/>
  <text x="372" y="242" fill="#83C167" font-family="Georgia, serif" font-style="italic" font-size="18">s</text>

  <!-- radius R in left circle -->
  <line x1="300" y1="250" x2="300" y2="360" stroke="#58C4DD" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="306" y="312" fill="#58C4DD" font-family="Georgia, serif" font-style="italic" font-size="18">R</text>

  <!-- cusp point: circles cross at x=385, y=250+sqrt(110^2-85^2)=250+69.8=319.8 -->
  <circle cx="385" cy="320" r="4.5" fill="#FC6255"/>
  <!-- cusp height h from baseline(360) to cusp(320) -->
  <line x1="385" y1="320" x2="385" y2="360" stroke="#FC6255" stroke-width="2.5"/>
  <text x="392" y="346" fill="#FC6255" font-family="Georgia, serif" font-style="italic" font-size="18">h</text>

  <!-- right triangle: center(300,250) -> (385,250) [s/2] -> (385,320) [R-h] -> center [R] -->
  <line x1="300" y1="250" x2="385" y2="250" stroke="#9aa6bd" stroke-width="1.6" stroke-dasharray="3 3"/>
  <line x1="385" y1="250" x2="385" y2="320" stroke="#9aa6bd" stroke-width="1.6" stroke-dasharray="3 3"/>
  <line x1="300" y1="250" x2="385" y2="320" stroke="#FFD54A" stroke-width="1.8"/>
  <rect x="377" y="250" width="8" height="8" fill="none" stroke="#9aa6bd" stroke-width="1"/>
  <text x="332" y="266" fill="#9aa6bd" font-family="Georgia, serif" font-size="13">s/2</text>
  <text x="390" y="290" fill="#9aa6bd" font-family="Georgia, serif" font-size="13">R&#8722;h</text>

  <text x="36" y="40" fill="#58C4DD" font-family="Georgia, serif" font-size="20">Cusp left between adjacent tool passes</text>
  <text x="470" y="120" fill="#9aa6bd" font-family="Georgia, serif" font-size="14">From the right triangle:</text>
  <text x="470" y="146" fill="#E8E8E8" font-family="Georgia, serif" font-size="16">R&#178; = (s/2)&#178; + (R&#8722;h)&#178;</text>
  <text x="470" y="172" fill="#6f7d97" font-family="Georgia, serif" font-size="13">solve for h, then approximate</text>
</svg>
