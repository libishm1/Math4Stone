<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" role="img" aria-label="The Kalman filter predict-update loop above, and below three Gaussians: a wide prior, a measurement, and a narrower fused posterior between them">
  <defs>
    <pattern id="gk" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1d2740" stroke-width="1"/></pattern>
    <marker id="mk" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9aa6bd"/></marker>
    <marker id="mkr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FC6255"/></marker>
  </defs>
  <rect width="720" height="470" fill="#0e1116"/>
  <rect width="720" height="470" fill="url(#gk)" opacity="0.4"/>

  <!-- predict-update loop -->
  <rect x="110" y="48" width="170" height="58" rx="12" fill="none" stroke="#58C4DD" stroke-width="2.5"/>
  <text x="195" y="76" fill="#58C4DD" font-family="Georgia, serif" font-size="18" text-anchor="middle">PREDICT</text>
  <text x="195" y="96" fill="#6f86a8" font-family="Georgia, serif" font-size="12" text-anchor="middle">x&#8315;=Fx,  P&#8315;=FPF&#7488;+Q</text>

  <rect x="440" y="48" width="170" height="58" rx="12" fill="none" stroke="#FFD54A" stroke-width="2.5"/>
  <text x="525" y="76" fill="#FFD54A" font-family="Georgia, serif" font-size="18" text-anchor="middle">UPDATE</text>
  <text x="525" y="96" fill="#9a8a55" font-family="Georgia, serif" font-size="12" text-anchor="middle">fuse with measurement z</text>

  <line x1="280" y1="68" x2="436" y2="68" stroke="#9aa6bd" stroke-width="2" marker-end="url(#mk)"/>
  <text x="358" y="58" fill="#9aa6bd" font-family="Georgia, serif" font-size="13" text-anchor="middle">x&#8315;, P&#8315;</text>
  <path d="M440 90 C 360 132 360 132 280 90" fill="none" stroke="#9aa6bd" stroke-width="2" marker-end="url(#mk)"/>
  <text x="360" y="128" fill="#9aa6bd" font-family="Georgia, serif" font-size="13" text-anchor="middle">x&#8314;, P&#8314;</text>
  <line x1="525" y1="20" x2="525" y2="44" stroke="#FC6255" stroke-width="2" marker-end="url(#mkr)"/>
  <text x="540" y="32" fill="#FC6255" font-family="Georgia, serif" font-style="italic" font-size="15">z</text>

  <!-- state axis -->
  <line x1="80" y1="430" x2="650" y2="430" stroke="#54648a" stroke-width="1.5"/>
  <text x="652" y="434" fill="#6f7d97" font-family="Georgia, serif" font-style="italic" font-size="15">x</text>

  <!-- prior (wide, blue) center 300 -->
  <path d="M170,430 C 250,424 270,300 300,296 C 330,300 350,424 430,430" fill="none" stroke="#58C4DD" stroke-width="3"/>
  <line x1="300" y1="296" x2="300" y2="430" stroke="#58C4DD" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
  <text x="284" y="448" fill="#58C4DD" font-family="Georgia, serif" font-style="italic" font-size="15">x&#8315;</text>

  <!-- measurement (red) center 470 -->
  <path d="M400,430 C 445,424 455,250 470,246 C 485,250 495,424 540,430" fill="none" stroke="#FC6255" stroke-width="3"/>
  <line x1="470" y1="246" x2="470" y2="430" stroke="#FC6255" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
  <text x="464" y="448" fill="#FC6255" font-family="Georgia, serif" font-style="italic" font-size="15">z</text>

  <!-- posterior (narrow, tall, yellow) center 415 -->
  <path d="M360,430 C 398,424 408,196 415,192 C 422,196 432,424 470,430" fill="none" stroke="#FFD54A" stroke-width="3.5"/>
  <line x1="415" y1="192" x2="415" y2="430" stroke="#FFD54A" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.7"/>
  <text x="408" y="448" fill="#FFD54A" font-family="Georgia, serif" font-style="italic" font-size="15">x&#8314;</text>

  <text x="36" y="172" fill="#83C167" font-family="Georgia, serif" font-size="14">narrower = more certain</text>

  <text x="36" y="206" fill="#9aa6bd" font-family="Georgia, serif" font-size="13">From the picture, construct the update:</text>
  <text x="36" y="226" fill="#6f7d97" font-family="Georgia, serif" font-size="13">x&#8314; sits between x&#8315; and z, pulled by the gain K</text>
</svg>
