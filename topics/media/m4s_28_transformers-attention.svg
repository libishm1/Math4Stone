<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Scaled dot-product attention: geometric setup</title>
  <desc>A query vector compared to key vectors gives scores, scaled and softmaxed into weights that blend the value vectors.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#FFD54A"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#58C4DD"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="20" y="34" fill="#58C4DD" font-family="Georgia, serif" font-size="21">Attention is a content-addressed average</text>
  <text x="20" y="56" fill="#9aa6bd" font-family="Georgia, serif" font-size="13">Given a query, keys, and values, build weights from similarities &#8212; the equation is the recipe.</text>

  <!-- left: vector geometry of query vs keys -->
  <g transform="translate(150,300)">
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#3a4a66" stroke-width="1"/>
    <line x1="0" y1="80" x2="0" y2="-150" stroke="#3a4a66" stroke-width="1"/>
    <!-- query -->
    <line x1="0" y1="0" x2="95" y2="0" stroke="#FFD54A" stroke-width="3" marker-end="url(#ah)"/>
    <text x="98" y="-8" fill="#FFD54A" font-family="Georgia, serif" font-size="15" font-style="italic">q</text>
    <!-- key 1 (aligned) -->
    <line x1="0" y1="0" x2="86" y2="-30" stroke="#83C167" stroke-width="2.5" marker-end="url(#ah)"/>
    <text x="90" y="-34" fill="#83C167" font-family="Georgia, serif" font-size="13" font-style="italic">k&#8321;</text>
    <!-- key 2 (orthogonal) -->
    <line x1="0" y1="0" x2="6" y2="-92" stroke="#FC6255" stroke-width="2.5" marker-end="url(#ah)"/>
    <text x="12" y="-96" fill="#FC6255" font-family="Georgia, serif" font-size="13" font-style="italic">k&#8322;</text>
    <!-- key 3 -->
    <line x1="0" y1="0" x2="64" y2="-64" stroke="#9CE8D6" stroke-width="2.5" marker-end="url(#ah)"/>
    <text x="66" y="-66" fill="#9CE8D6" font-family="Georgia, serif" font-size="13" font-style="italic">k&#8323;</text>
    <text x="-120" y="56" fill="#9aa6bd" font-family="Georgia, serif" font-size="12">score s&#8323;&#8202;=&#8202;q&#183;k&#8202;= |q||k|cos&#952;  (given)</text>
    <text x="-120" y="74" fill="#9aa6bd" font-family="Georgia, serif" font-size="12">aligned key &#8594; large s, near-orthogonal &#8594; small s</text>
  </g>

  <!-- right: the pipeline scores -> scale -> softmax -> blend -->
  <g transform="translate(420,110)">
    <text x="0" y="0" fill="#58C4DD" font-family="Georgia, serif" font-size="13">scores  s = q&#183;k&#7338;</text>
    <rect x="0" y="10" width="190" height="26" fill="none" stroke="#58C4DD" stroke-width="1"/>
    <text x="8" y="28" fill="#e6ecf5" font-family="monospace" font-size="13">[ s&#8321;  s&#8322;  s&#8323; ]</text>
    <line x1="95" y1="36" x2="95" y2="64" stroke="#58C4DD" stroke-width="1.5" marker-end="url(#ahb)"/>
    <text x="105" y="58" fill="#9aa6bd" font-family="Georgia, serif" font-size="11">&#247; &#8730;d&#8342;  (given scale)</text>

    <text x="0" y="84" fill="#58C4DD" font-family="Georgia, serif" font-size="13">softmax &#8594; weights (sum&#8202;=&#8202;1)</text>
    <rect x="0" y="94" width="190" height="26" fill="none" stroke="#83C167" stroke-width="1"/>
    <text x="8" y="112" fill="#e6ecf5" font-family="monospace" font-size="13">[ w&#8321;  w&#8322;  w&#8323; ]</text>
    <line x1="95" y1="120" x2="95" y2="148" stroke="#58C4DD" stroke-width="1.5" marker-end="url(#ahb)"/>
    <text x="105" y="142" fill="#9aa6bd" font-family="Georgia, serif" font-size="11">blend values V</text>

    <text x="0" y="168" fill="#58C4DD" font-family="Georgia, serif" font-size="13">output = &#931;&#8202; w&#7338; v&#7338;</text>
    <rect x="0" y="178" width="190" height="26" fill="none" stroke="#FFD54A" stroke-width="1.5"/>
    <text x="8" y="196" fill="#FFD54A" font-family="monospace" font-size="13">o = w&#8901;V</text>
  </g>
</svg>
