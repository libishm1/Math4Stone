<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="A Gaussian bell curve with its mean mu at the center and one standard deviation sigma shaded on each side">
  <defs>
    <pattern id="g6" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#222c44" stroke-width="1"/></pattern>
  </defs>
  <rect width="720" height="440" fill="#0e1116"/>
  <rect width="720" height="440" fill="url(#g6)" opacity="0.4"/>

  <!-- baseline -->
  <line x1="80" y1="350" x2="650" y2="350" stroke="#54648a" stroke-width="1.5"/>

  <!-- +/- sigma shaded band (x 300..420) under curve -->
  <path d="M300,350 L300,238 C330,150 390,150 420,238 L420,350 Z" fill="#58C4DD" opacity="0.22"/>

  <!-- bell curve -->
  <path d="M120,348 C 240,344 300,150 360,118 C 420,150 480,344 600,348" fill="none" stroke="#FFD54A" stroke-width="3.5"/>

  <!-- mean line -->
  <line x1="360" y1="118" x2="360" y2="350" stroke="#FC6255" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="350" y="372" fill="#FC6255" font-family="Georgia, serif" font-style="italic" font-size="18">&#956;</text>

  <!-- sigma markers -->
  <text x="292" y="372" fill="#58C4DD" font-family="Georgia, serif" font-style="italic" font-size="15">&#956;&#8722;&#963;</text>
  <text x="404" y="372" fill="#58C4DD" font-family="Georgia, serif" font-style="italic" font-size="15">&#956;+&#963;</text>

  <text x="448" y="180" fill="#E8E8E8" font-family="Georgia, serif" font-size="18">p(x) = e^(&#8722;(x&#8722;&#956;)&#178;/2&#963;&#178;)</text>
  <text x="448" y="206" fill="#9aa6bd" font-family="Georgia, serif" font-size="14">/ &#8730;(2&#960;) &#963;</text>

  <text x="36" y="52" fill="#58C4DD" font-family="Georgia, serif" font-size="22">The Gaussian: mean &#956;, spread &#963;</text>
  <text x="36" y="78" fill="#6f7d97" font-family="Georgia, serif" font-size="16">sums of many small errors pile into this bell</text>
</svg>
