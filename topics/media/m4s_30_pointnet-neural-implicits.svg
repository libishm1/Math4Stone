<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#FFD54A"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#58C4DD"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="22" y="34" fill="#58C4DD" font-family="Georgia, 'Times New Roman', serif" font-size="20">PointNet symmetry + the implicit zero level set</text>
  <text x="22" y="54" fill="#9aa6bd" font-size="12">unordered points -&gt; shared map h -&gt; max-pool -&gt; global feature g ; surface = where the field crosses zero</text>

  <!-- LEFT: PointNet symmetric pipeline -->
  <text x="40" y="92" fill="#9CE8D6" font-size="13">set { x_i }  (any order)</text>
  <!-- four points -->
  <circle cx="58" cy="130" r="5" fill="#FFD54A"/><text x="40" y="125" fill="#9aa6bd" font-size="11">x1</text>
  <circle cx="58" cy="166" r="5" fill="#FFD54A"/><text x="40" y="161" fill="#9aa6bd" font-size="11">x2</text>
  <circle cx="58" cy="202" r="5" fill="#FFD54A"/><text x="40" y="197" fill="#9aa6bd" font-size="11">x3</text>
  <circle cx="58" cy="238" r="5" fill="#FFD54A"/><text x="40" y="233" fill="#9aa6bd" font-size="11">x4</text>

  <!-- shared h box -->
  <rect x="120" y="120" width="58" height="128" rx="6" fill="none" stroke="#83C167" stroke-width="1.6"/>
  <text x="149" y="118" fill="#83C167" font-size="12" text-anchor="middle">shared h</text>
  <text x="149" y="190" fill="#9aa6bd" font-size="10" text-anchor="middle">(same MLP</text>
  <text x="149" y="203" fill="#9aa6bd" font-size="10" text-anchor="middle">per point)</text>

  <line x1="63" y1="130" x2="118" y2="135" stroke="#FFD54A" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="63" y1="166" x2="118" y2="160" stroke="#FFD54A" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="63" y1="202" x2="118" y2="200" stroke="#FFD54A" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="63" y1="238" x2="118" y2="232" stroke="#FFD54A" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- max-pool box -->
  <rect x="210" y="150" width="74" height="68" rx="6" fill="none" stroke="#FC6255" stroke-width="1.6"/>
  <text x="247" y="180" fill="#FC6255" font-size="13" text-anchor="middle">max</text>
  <text x="247" y="198" fill="#9aa6bd" font-size="10" text-anchor="middle">i = 1..n</text>
  <line x1="178" y1="184" x2="208" y2="184" stroke="#83C167" stroke-width="1.6" marker-end="url(#ahb)"/>

  <!-- global feature g -->
  <line x1="284" y1="184" x2="324" y2="184" stroke="#FC6255" stroke-width="1.6" marker-end="url(#ahb)"/>
  <circle cx="338" cy="184" r="8" fill="#58C4DD"/>
  <text x="338" y="166" fill="#58C4DD" font-size="13" text-anchor="middle">g</text>
  <text x="338" y="214" fill="#9aa6bd" font-size="10" text-anchor="middle">order-free</text>

  <text x="40" y="288" fill="#9aa6bd" font-size="11" font-family="Georgia, serif">given: any permutation P of {x_i} leaves max unchanged</text>

  <!-- RIGHT: implicit zero level set -->
  <g transform="translate(470,250)">
    <text x="0" y="-118" fill="#9CE8D6" font-size="13" text-anchor="middle">field f(x): sign tells inside/outside</text>
    <!-- axes -->
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#26324d" stroke-width="1"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#26324d" stroke-width="1"/>
    <!-- zero level set circle (radius r) -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#58C4DD" stroke-width="2"/>
    <text x="52" y="-46" fill="#58C4DD" font-size="12">f(x)=0</text>
    <!-- inside point -->
    <circle cx="0" cy="0" r="4" fill="#83C167"/>
    <text x="6" y="-6" fill="#83C167" font-size="11">f&lt;0 inside</text>
    <!-- outside point -->
    <circle cx="96" cy="0" r="4" fill="#FC6255"/>
    <text x="36" y="22" fill="#FC6255" font-size="11">f&gt;0 outside</text>
    <!-- radius arrow -->
    <line x1="0" y1="0" x2="70" y2="0" stroke="#FFD54A" stroke-width="1.6" marker-end="url(#ah)"/>
    <text x="20" y="-8" fill="#FFD54A" font-size="12">r</text>
    <!-- query point on surface -->
    <circle cx="0" cy="-70" r="4" fill="#FFD54A"/>
    <text x="6" y="-76" fill="#9aa6bd" font-size="10">on surface</text>
    <text x="-2" y="120" fill="#9aa6bd" font-size="11" text-anchor="middle" font-family="Georgia, serif">given: f(x) = ||x - c|| - r</text>
  </g>

  <text x="22" y="446" fill="#9aa6bd" font-size="11">Construct: max-pool's symmetry from the set, and the surface S = { x : f(x)=0 } from the sign-flip of the field.</text>
</svg>
