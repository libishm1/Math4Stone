<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="msg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#FFD54A"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="24" y="38" fill="#58C4DD" font-size="22">Message passing: aggregating a node's one-ring</text>
  <text x="24" y="60" fill="#9aa6bd" font-size="13" font-style="italic">neighbours send messages into u; degrees and self-loop set the normalized weights</text>

  <!-- edges (drawn under nodes) -->
  <g stroke="#9aa6bd" stroke-width="2" opacity="0.55">
    <line x1="330" y1="250" x2="160" y2="160"/>
    <line x1="330" y1="250" x2="180" y2="330"/>
    <line x1="330" y1="250" x2="330" y2="110"/>
    <line x1="330" y1="250" x2="500" y2="190"/>
  </g>

  <!-- message arrows along edges into u -->
  <g stroke="#FFD54A" stroke-width="2.4" fill="none" marker-end="url(#msg)" opacity="0.95">
    <line x1="172" y1="167" x2="300" y2="234"/>
    <line x1="190" y1="322" x2="305" y2="263"/>
    <line x1="330" y1="124" x2="330" y2="206"/>
    <line x1="488" y1="197" x2="362" y2="240"/>
  </g>

  <!-- self loop on u (given scaffold) -->
  <path d="M352 270 a30 30 0 1 1 -22 26" fill="none" stroke="#FC6255" stroke-width="2.4" marker-end="url(#msg)"/>
  <text x="372" y="320" fill="#FC6255" font-size="13">self-loop (A+I)</text>

  <!-- neighbour nodes -->
  <g font-size="14">
    <circle cx="160" cy="160" r="20" fill="#1b2435" stroke="#83C167" stroke-width="2.5"/>
    <text x="160" y="165" fill="#9CE8D6" text-anchor="middle">v1</text>
    <text x="124" y="142" fill="#9aa6bd" font-size="12">d=4</text>

    <circle cx="180" cy="330" r="20" fill="#1b2435" stroke="#83C167" stroke-width="2.5"/>
    <text x="180" y="335" fill="#9CE8D6" text-anchor="middle">v2</text>
    <text x="146" y="362" fill="#9aa6bd" font-size="12">d=2</text>

    <circle cx="330" cy="110" r="20" fill="#1b2435" stroke="#83C167" stroke-width="2.5"/>
    <text x="330" y="115" fill="#9CE8D6" text-anchor="middle">v3</text>
    <text x="356" y="100" fill="#9aa6bd" font-size="12">d=3</text>

    <circle cx="500" cy="190" r="20" fill="#1b2435" stroke="#83C167" stroke-width="2.5"/>
    <text x="500" y="195" fill="#9CE8D6" text-anchor="middle">v4</text>
    <text x="522" y="178" fill="#9aa6bd" font-size="12">d=3</text>
  </g>

  <!-- central node u -->
  <circle cx="330" cy="250" r="26" fill="#13233a" stroke="#58C4DD" stroke-width="3"/>
  <text x="330" y="256" fill="#FFD54A" text-anchor="middle" font-size="17">u</text>
  <text x="330" y="296" fill="#58C4DD" text-anchor="middle" font-size="12">deg d~u=5 (with self-loop)</text>

  <!-- given scaffold relation -->
  <text x="430" y="358" fill="#9aa6bd" font-size="13" font-style="italic">given: edge weight</text>
  <text x="430" y="380" fill="#9CE8D6" font-size="15">a&#770;&#8202;&#8202;&#8202;= 1 / &#8730;( d&#771;&#8202;u &#183; d&#771;&#8202;v )  per neighbour</text>
  <text x="430" y="404" fill="#9aa6bd" font-size="12" font-style="italic">sum weighted messages, transform by W, then &#963;( &#183; )</text>
</svg>
