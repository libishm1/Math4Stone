<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="A curve with a green tangent line showing the derivative and a blue shaded area under it showing the integral">
  <defs>
    <pattern id="gridc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="cah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#54648a"/></marker>
  </defs>

  <rect width="720" height="440" fill="#0e1116"/>
  <rect width="720" height="440" fill="url(#gridc)" opacity="0.5"/>

  <!-- axes -->
  <line x1="70" y1="360" x2="690" y2="360" stroke="#54648a" stroke-width="1.5" marker-end="url(#cah)"/>
  <line x1="80" y1="400" x2="80" y2="70" stroke="#54648a" stroke-width="1.5" marker-end="url(#cah)"/>

  <!-- area under curve (integral) -->
  <path d="M140,330 C 280,90 460,90 600,330 L600,360 L140,360 Z" fill="#58C4DD" opacity="0.20"/>

  <!-- the curve -->
  <path d="M140,330 C 280,90 460,90 600,330" fill="none" stroke="#C9A06a" stroke-width="3.5"/>

  <!-- tangent line (derivative) -->
  <line x1="175" y1="320" x2="365" y2="120" stroke="#83C167" stroke-width="3"/>
  <circle cx="262" cy="183" r="5" fill="#83C167"/>

  <!-- labels -->
  <text x="300" y="300" fill="#58C4DD" font-family="Georgia, serif" font-style="italic" font-size="20">area  =  &#8747; f(x) dx</text>
  <text x="300" y="322" fill="#6f86a8" font-family="Georgia, serif" font-size="14">the integral</text>
  <text x="300" y="120" fill="#83C167" font-family="Georgia, serif" font-style="italic" font-size="20">slope  =  f &#8242;(x)</text>
  <text x="300" y="142" fill="#6f9a63" font-family="Georgia, serif" font-size="14">the derivative</text>
  <text x="612" y="318" fill="#C9A06a" font-family="Georgia, serif" font-style="italic" font-size="20">f</text>

  <text x="36" y="52" fill="#58C4DD" font-family="Georgia, serif" font-size="22">Derivative and integral are inverses</text>
  <text x="36" y="78" fill="#6f7d97" font-family="Georgia, serif" font-size="16">slope of the curve  vs  area under it</text>
</svg>
