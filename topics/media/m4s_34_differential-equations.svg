<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#FFD54A"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#58C4DD"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <!-- title + caption -->
  <text x="24" y="34" fill="#58C4DD" font-family="Georgia, 'Times New Roman', serif" font-size="20">Stepping an ODE forward: the slope field</text>
  <text x="24" y="54" fill="#9aa6bd" font-size="13">Given the rule y' = f(t,y) and a start y(t0)=y0, follow the local slope one step h at a time.</text>

  <!-- axes -->
  <line x1="70" y1="400" x2="680" y2="400" stroke="#9aa6bd" stroke-width="1.5" marker-end="url(#ahb)"/>
  <line x1="70" y1="400" x2="70" y2="90" stroke="#9aa6bd" stroke-width="1.5" marker-end="url(#ahb)"/>
  <text x="672" y="420" fill="#58C4DD" font-size="13">t</text>
  <text x="48" y="100" fill="#58C4DD" font-size="13">y</text>

  <!-- slope field hatches (given: y' = f(t,y)) -->
  <g stroke="#9CE8D6" stroke-width="1.4" opacity="0.55">
    <line x1="150" y1="150" x2="186" y2="138"/>
    <line x1="150" y1="240" x2="186" y2="222"/>
    <line x1="150" y1="330" x2="186" y2="306"/>
    <line x1="300" y1="170" x2="336" y2="164"/>
    <line x1="300" y1="260" x2="336" y2="248"/>
    <line x1="300" y1="350" x2="336" y2="332"/>
    <line x1="450" y1="190" x2="486" y2="188"/>
    <line x1="450" y1="280" x2="486" y2="274"/>
    <line x1="450" y1="360" x2="486" y2="350"/>
    <line x1="600" y1="210" x2="636" y2="210"/>
    <line x1="600" y1="300" x2="636" y2="298"/>
  </g>
  <text x="556" y="150" fill="#9CE8D6" font-size="12">slope field f(t,y)  "given"</text>

  <!-- true solution curve -->
  <path d="M110 130 C 240 200, 360 300, 660 360" fill="none" stroke="#83C167" stroke-width="2.5"/>
  <text x="556" y="378" fill="#83C167" font-size="12">true y(t)</text>

  <!-- start point y0 -->
  <circle cx="110" cy="130" r="5" fill="#FC6255"/>
  <text x="74" y="120" fill="#FC6255" font-size="13">y0</text>

  <!-- Euler step: tangent of length h -->
  <line x1="110" y1="130" x2="260" y2="172" stroke="#FFD54A" stroke-width="2.6" marker-end="url(#ah)"/>
  <circle cx="260" cy="172" r="4.5" fill="#FFD54A"/>
  <text x="178" y="138" fill="#FFD54A" font-size="13">slope f(t0,y0)</text>
  <text x="226" y="200" fill="#FFD54A" font-size="13">y1</text>

  <!-- step width h bracket -->
  <line x1="110" y1="418" x2="260" y2="418" stroke="#58C4DD" stroke-width="1.4"/>
  <line x1="110" y1="412" x2="110" y2="424" stroke="#58C4DD" stroke-width="1.4"/>
  <line x1="260" y1="412" x2="260" y2="424" stroke="#58C4DD" stroke-width="1.4"/>
  <text x="178" y="436" fill="#58C4DD" font-size="13">h</text>

  <!-- vertical drop to read t0, t1 -->
  <line x1="110" y1="130" x2="110" y2="400" stroke="#26324d" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="260" y1="172" x2="260" y2="400" stroke="#26324d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="102" y="416" fill="#9aa6bd" font-size="11">t0</text>
  <text x="248" y="416" fill="#9aa6bd" font-size="11">t1=t0+h</text>

  <!-- local error gap -->
  <line x1="260" y1="172" x2="260" y2="208" stroke="#FC6255" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="266" y="196" fill="#FC6255" font-size="11">local error</text>
</svg>
