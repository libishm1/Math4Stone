<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="An eigenvector stays on its own span and is only scaled by lambda, while an off-span vector gets knocked off its direction">
  <defs>
    <pattern id="g3" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#222c44" stroke-width="1"/></pattern>
    <marker id="g3y" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFD54A"/></marker>
    <marker id="g3o" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FF9F45"/></marker>
    <marker id="g3s" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7e8aa6"/></marker>
  </defs>
  <rect width="720" height="440" fill="#0e1116"/>
  <rect width="720" height="440" fill="url(#g3)" opacity="0.45"/>
  <line x1="20" y1="260" x2="700" y2="260" stroke="#54648a" stroke-width="1.5"/>
  <line x1="200" y1="20" x2="200" y2="420" stroke="#54648a" stroke-width="1.5"/>

  <!-- eigen-span line -->
  <line x1="40" y1="340" x2="520" y2="100" stroke="#FFD54A" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.55"/>

  <!-- eigenvector before and after (same span, scaled by lambda) -->
  <line x1="200" y1="260" x2="276" y2="222" stroke="#FFD54A" stroke-width="4.5" marker-end="url(#g3y)"/>
  <line x1="200" y1="260" x2="324" y2="198" stroke="#FF9F45" stroke-width="3" stroke-dasharray="2 3" marker-end="url(#g3o)"/>

  <!-- off-span vector knocked off direction -->
  <line x1="200" y1="260" x2="150" y2="160" stroke="#7e8aa6" stroke-width="3" marker-end="url(#g3s)"/>
  <line x1="200" y1="260" x2="120" y2="190" stroke="#5b6680" stroke-width="3" stroke-dasharray="2 3" marker-end="url(#g3s)"/>
  <circle cx="200" cy="260" r="4" fill="#cdd6e6"/>

  <text x="288" y="206" fill="#FFD54A" font-family="Georgia, serif" font-style="italic" font-size="18">v</text>
  <text x="332" y="186" fill="#FF9F45" font-family="Georgia, serif" font-style="italic" font-size="18">&#955; v</text>
  <text x="430" y="150" fill="#E8E8E8" font-family="Georgia, serif" font-size="20">A v = &#955; v</text>
  <text x="430" y="178" fill="#9aa6bd" font-family="Georgia, serif" font-size="15">eigenvector: stays on its span</text>
  <text x="96" y="150" fill="#7e8aa6" font-family="Georgia, serif" font-size="15">off-span: rotates away</text>

  <text x="36" y="56" fill="#58C4DD" font-family="Georgia, serif" font-size="22">Eigenvectors keep their direction</text>
  <text x="36" y="82" fill="#6f7d97" font-family="Georgia, serif" font-size="16">the matrix only stretches them by &#955;</text>
</svg>
