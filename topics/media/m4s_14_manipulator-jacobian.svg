<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Planar 2R arm: the geometric setup from which the Jacobian is built</title>
  <desc>Two revolute joints with link lengths L1, L2 and angles theta1, theta2 locate the tip (x,y); differentiating the given position map yields the Jacobian.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#26324d" stroke-width="1"/>
    </pattern>
    <marker id="aY" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9z" fill="#FFD54A"/>
    </marker>
    <marker id="aG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9z" fill="#83C167"/>
    </marker>
    <marker id="aT" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9z" fill="#9CE8D6"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#0e1116"/>
  <rect width="720" height="460" fill="url(#grid)"/>

  <text x="24" y="38" fill="#58C4DD" font-family="Georgia, serif" font-size="22">Planar 2R arm: build the Jacobian by differentiating the tip map</text>
  <text x="24" y="60" fill="#9aa6bd" font-family="Georgia, serif" font-size="13">Given the position of the tip (x,y) as a function of theta1, theta2, the Jacobian is its derivative.</text>

  <!-- base frame at origin -->
  <line x1="120" y1="380" x2="220" y2="380" stroke="#9aa6bd" stroke-width="1.4"/>
  <line x1="120" y1="380" x2="120" y2="290" stroke="#9aa6bd" stroke-width="1.4"/>
  <text x="226" y="384" fill="#9aa6bd" font-family="Georgia, serif" font-size="13" font-style="italic">x</text>
  <text x="108" y="288" fill="#9aa6bd" font-family="Georgia, serif" font-size="13" font-style="italic">y</text>

  <!-- joint 1 at base -->
  <circle cx="120" cy="380" r="6" fill="#FC6255"/>
  <text x="74" y="404" fill="#FC6255" font-family="Georgia, serif" font-size="14" font-style="italic">joint 1</text>

  <!-- link 1 -->
  <line x1="120" y1="380" x2="370" y2="262" stroke="#FFD54A" stroke-width="4" marker-end="url(#aY)"/>
  <text x="214" y="304" fill="#FFD54A" font-family="Georgia, serif" font-size="16" font-style="italic">L1</text>

  <!-- theta1 arc from x-axis to link1 -->
  <path d="M168 380 A48 48 0 0 0 142 339" fill="none" stroke="#9CE8D6" stroke-width="1.6" marker-end="url(#aT)"/>
  <text x="176" y="356" fill="#9CE8D6" font-family="Georgia, serif" font-size="15" font-style="italic">&#952;1</text>

  <!-- joint 2 (elbow) -->
  <circle cx="370" cy="262" r="6" fill="#FC6255"/>
  <text x="324" y="248" fill="#FC6255" font-family="Georgia, serif" font-size="14" font-style="italic">joint 2</text>

  <!-- link 2 -->
  <line x1="370" y1="262" x2="560" y2="160" stroke="#83C167" stroke-width="4" marker-end="url(#aG)"/>
  <text x="470" y="196" fill="#83C167" font-family="Georgia, serif" font-size="16" font-style="italic">L2</text>

  <!-- dashed continuation of link1 direction for theta2 arc reference -->
  <line x1="370" y1="262" x2="470" y2="215" stroke="#26324d" stroke-width="1.4" stroke-dasharray="4 4"/>
  <path d="M428 234 A44 44 0 0 0 410 200" fill="none" stroke="#9CE8D6" stroke-width="1.6" marker-end="url(#aT)"/>
  <text x="436" y="214" fill="#9CE8D6" font-family="Georgia, serif" font-size="15" font-style="italic">&#952;2</text>

  <!-- end-effector tip -->
  <circle cx="560" cy="160" r="6" fill="#58C4DD"/>
  <text x="568" y="156" fill="#58C4DD" font-family="Georgia, serif" font-size="15" font-style="italic">tip (x, y)</text>

  <!-- given scaffold relation -->
  <rect x="430" y="350" width="270" height="84" rx="8" fill="#11161d" stroke="#26324d" stroke-width="1"/>
  <text x="446" y="376" fill="#58C4DD" font-family="Georgia, serif" font-size="13">given (forward position map):</text>
  <text x="446" y="402" fill="#e6ebf2" font-family="Georgia, serif" font-size="16" font-style="italic">x = L1 cos&#952;1 + L2 cos(&#952;1+&#952;2)</text>
  <text x="446" y="424" fill="#e6ebf2" font-family="Georgia, serif" font-size="16" font-style="italic">y = L1 sin&#952;1 + L2 sin(&#952;1+&#952;2)</text>
</svg>
